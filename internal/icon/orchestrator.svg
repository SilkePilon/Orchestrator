<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!--
    GNOME HIG Design Specs:
    - Perspective: 2D front-facing with a 4px "front profile" (depth)
    - Colors: GNOME Palette (Blue 3, Blue 4, Blue 1)
    - Grid: 128x128 with centered 7-spoke helm
  -->

  <!-- SHADOW/DEPTH PROFILE (The 4px bottom edge) -->
  <g transform="translate(0, 4)">
    <path fill="#1c71d8" d="M64 12C35.3 12 12 35.3 12 64s23.3 52 52 52 52-23.3 52-52S92.7 12 64 12zm0 88c-19.9 0-36-16.1-36-36s16.1-36 36-36 36 16.1 36 36-16.1 36-36 36z"/>
    <!-- Spokes Depth -->
    <g fill="#1c71d8">
      <rect x="60" y="4" width="8" height="16" rx="2"/>
      <rect x="60" y="4" width="8" height="16" rx="2" transform="rotate(51.4 64 64)"/>
      <rect x="60" y="4" width="8" height="16" rx="2" transform="rotate(102.8 64 64)"/>
      <rect x="60" y="4" width="8" height="16" rx="2" transform="rotate(154.2 64 64)"/>
      <rect x="60" y="4" width="8" height="16" rx="2" transform="rotate(205.6 64 64)"/>
      <rect x="60" y="4" width="8" height="16" rx="2" transform="rotate(257 64 64)"/>
      <rect x="60" y="4" width="8" height="16" rx="2" transform="rotate(308.4 64 64)"/>
    </g>
  </g>

  <!-- TOP SURFACE (Main Blue Object) -->
  <path fill="#3584e4" d="M64 12C35.3 12 12 35.3 12 64s23.3 52 52 52 52-23.3 52-52S92.7 12 64 12zm0 88c-19.9 0-36-16.1-36-36s16.1-36 36-36 36 16.1 36 36-16.1 36-36 36z"/>

  <!-- 7 Spokes -->
  <g fill="#3584e4">
    <rect x="60" y="4" width="8" height="16" rx="2"/>
    <rect x="60" y="4" width="8" height="16" rx="2" transform="rotate(51.4 64 64)"/>
    <rect x="60" y="4" width="8" height="16" rx="2" transform="rotate(102.8 64 64)"/>
    <rect x="60" y="4" width="8" height="16" rx="2" transform="rotate(154.2 64 64)"/>
    <rect x="60" y="4" width="8" height="16" rx="2" transform="rotate(205.6 64 64)"/>
    <rect x="60" y="4" width="8" height="16" rx="2" transform="rotate(257 64 64)"/>
    <rect x="60" y="4" width="8" height="16" rx="2" transform="rotate(308.4 64 64)"/>
  </g>

  <!-- INNER HUB (Light Detail) -->
  <circle cx="64" cy="64" r="12" fill="#99c1f1"/>
  <circle cx="64" cy="64" r="6" fill="#1c71d8"/>

  <!-- HIGHLIGHT (Subtle top edge for tactile feel) -->
  <path opacity="0.2" fill="white" d="M64 14c-27.6 0-50 22.4-50 50 0 .7.1 1.3.1 2C14.7 39.1 36.8 17 64 17s49.3 22.1 49.9 49c0-.7.1-1.3.1-2 0-27.6-22.4-50-50-50z"/>
</svg>